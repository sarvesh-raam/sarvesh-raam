name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: sarvesh-raam
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          config_padding: 0, 15 + 10%
          
          # Base Configuration
          repositories_affiliations: owner
          repositories_batch: 100
          
          # Achievements plugin
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: no
          plugin_achievements_threshold: C
                    plugin_achievements_ignored: manager
          
          # ISO Calendar plugin
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # Languages plugin
          plugin_languages: yes
          plugin_languages_ignored: jupyter notebook
          plugin_languages_analysis_timeout: 30
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage, lines
          plugin_languages_indepth: yes
          
          # Lines of code plugin
          plugin_lines: yes
          
          # Notable contributions
          plugin_notable: yes
          
          # People plugin
          plugin_people: yes
          plugin_people_limit: 24
          plugin_people_size: 28
          plugin_people_types: followers, following
          
          # Follow-up plugin
          plugin_followup: yes
          plugin_followup_sections: repositories
