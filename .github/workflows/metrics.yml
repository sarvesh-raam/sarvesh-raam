name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: sarvesh-raam
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          
          # Base Configuration (Force show all repos)
          repositories_affiliations: owner, collaborator
          repositories_batch: 100
          
          # Achievements plugin
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          
          # Introduction plugin
          plugin_introduction: yes
          plugin_introduction_title: yes
          
          # ISO Calendar plugin
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # Languages plugin (Refined)
          plugin_languages: yes
          plugin_languages_analysis_timeout: 30
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          plugin_languages_details: percentage, lines
          plugin_languages_indepth: yes # Scan all files for better accuracy
          
          # Lines of code plugin
          plugin_lines: yes
          
          # Notable contributions
          plugin_notable: yes
          
          # People plugin
          plugin_people: yes
          plugin_people_limit: 24
          plugin_people_size: 28
          plugin_people_types: followers, following
          
          # Follow-up plugin
          plugin_followup: yes
          plugin_followup_sections: repositories
