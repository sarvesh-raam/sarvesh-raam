name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Left Column (General Stats)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.left.svg
          user: sarvesh-raam
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          repositories_affiliations: owner
          
          # Languages plugin
          plugin_languages: yes
          plugin_languages_analysis_timeout: 30
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage, lines
          plugin_languages_indepth: yes
          
          # Lines of code
          plugin_lines: yes

      - name: Right Column (Activity & Achievements)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.right.svg
          user: sarvesh-raam
          template: classic
          base: "" # No base info here
          config_timezone: Asia/Kolkata
          
          # ISO Calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # Achievements
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: no
          
          # Notable contributions
          plugin_notable: yes
          
          # People
          plugin_people: yes
          plugin_people_limit: 24
          plugin_people_size: 28
          plugin_people_types: followers, following
          
          # Follow-up
          plugin_followup: yes
          plugin_followup_sections: repositories
